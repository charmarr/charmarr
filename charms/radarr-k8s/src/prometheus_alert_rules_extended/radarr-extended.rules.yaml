groups:
  - name: radarr.queue.extended
    rules:
      - alert: RadarrQueueDepthSustained
        expr: radarr_queue_count > 100
        for: 2h
        labels:
          severity: warning
          component: radarr
        annotations:
          summary: Radarr queue depth above 100 for 2h on {{ $labels.juju_unit }}
          description: |
            Sustained queue backlog. Either the download client cannot keep up,
            or there is a flood of monitored content with no matching releases.
            Investigate the download client and indexer cache hit rates.

      - alert: RadarrQueueWarningsHigh
        expr: radarr_queue_warning > 10
        for: 1h
        labels:
          severity: warning
          component: radarr
        annotations:
          summary: Radarr queue warnings above 10 on {{ $labels.juju_unit }}
          description: |
            Radarr is reporting more than 10 queue items in warning state.
            These usually correspond to imports waiting for matching files or
            quality conflicts. Run Radarr's "interactive import" workflow to
            resolve.

  - name: radarr.library.extended
    rules:
      - alert: RadarrMissingMoviesGrowing
        expr: increase(radarr_missing_movies_total[7d]) > 20
        labels:
          severity: warning
          component: radarr
        annotations:
          summary: Radarr missing-movies count grew by >20 in 7d on {{ $labels.juju_unit }}
          description: |
            More than 20 newly-monitored movies could not be downloaded over
            the last 7 days. Possible causes: indexer outage, RSS feed not
            updating, or restrictive quality profiles blocking all matches.
            Check Prowlarr health and the Radarr Activity > Wanted tab.

  - name: radarr.storage.extended
    rules:
      - alert: RadarrDiskFillForecast7d
        expr: predict_linear(radarr_free_disk_size[7d], 7 * 86400) < 0
        for: 1h
        labels:
          severity: warning
          component: radarr
        annotations:
          summary: Radarr root folder {{ $labels.path }} projected full within 7d on {{ $labels.juju_unit }}
          description: |
            Based on the last 7 days of free-space samples, root folder
            `{{ $labels.path }}` is on track to run out of space within the
            next 7 days. Plan capacity now.

  - name: radarr.reliability.extended
    rules:
      - alert: RadarrSidecarFlapping
        expr: changes(up{service="radarr"}[1h]) > 6
        labels:
          severity: warning
          component: radarr
        annotations:
          summary: Radarr scrape state has flapped >6 times in 1h on {{ $labels.juju_unit }}
          description: |
            scraparr's view of Radarr's health has toggled more than 6 times
            in the last hour. Indicates an unstable Radarr workload, or a
            networking issue between the two containers. Check Pebble service
            restart history.
