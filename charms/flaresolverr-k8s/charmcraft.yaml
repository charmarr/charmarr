name: flaresolverr-k8s
type: charm
title: FlareSolverr
summary: Cloudflare bypass proxy for Prowlarr and other indexer managers
description: |
  FlareSolverr is a proxy server that bypasses Cloudflare and other anti-bot
  protections. It enables indexer managers like Prowlarr to access sites that
  use Cloudflare protection.

  This charm provides automated deployment on Kubernetes with Prowlarr
  integration via the flaresolverr relation.

links:
  documentation: https://github.com/charmarr/charmarr
  source: https://github.com/charmarr/charmarr
  issues: https://github.com/charmarr/charmarr/issues

assumes:
  - k8s-api
  - juju >= 3.6

base: ubuntu@24.04
platforms:
  amd64:

parts:
  charm:
    source: .
    plugin: uv
    build-packages: [git]
    build-snaps: [astral-uv]

charm-libs:
  - lib: istio_beacon_k8s.service_mesh
    version: "0"
  - lib: prometheus_k8s.prometheus_scrape
    version: "0"
  - lib: loki_k8s.loki_push_api
    version: "1"
  - lib: grafana_k8s.grafana_dashboard
    version: "0"
  - lib: tempo_coordinator_k8s.tracing
    version: "0"

containers:
  flaresolverr:
    resource: flaresolverr-image

resources:
  flaresolverr-image:
    type: oci-image
    description: FlareSolverr container image
    upstream-source: ghcr.io/flaresolverr/flaresolverr:v3.5.0

provides:
  flaresolverr:
    interface: flaresolverr
  provide-cmr-mesh:
    interface: cross_model_mesh
    optional: true
    description: Access cross-model applications via service mesh
  crowsnest:
    interface: crowsnest
    optional: true
    description: |
      Opt this charm into the charmarr-crowsnest-k8s fleet view. The
      provider publishes its topology endpoint URL; crowsnest aggregates
      across all related peers for the fleet graph and SLO catalog.
  metrics-endpoint:
    interface: prometheus_scrape
    optional: true
    description: Prometheus scrape target for FlareSolverr's native /metrics endpoint
  grafana-dashboard:
    interface: grafana_dashboard
    optional: true
    description: Ships charm-bundled Grafana dashboards to a related Grafana

requires:
  require-cmr-mesh:
    interface: cross_model_mesh
    optional: true
    description: Allow cross-model access via service mesh
  service-mesh:
    interface: service_mesh
    limit: 1
    optional: true
    description: Subscribe to Istio service mesh for mTLS
  logging:
    interface: loki_push_api
    limit: 1
    optional: true
    description: Forwards Pebble service logs to Loki
  charm-tracing:
    interface: tracing
    limit: 1
    optional: true
    description: Charm hook execution traces to Tempo via ops[tracing]

config:
  options:
    log-level:
      type: string
      default: "info"
      description: |
        Log level for FlareSolverr.
        One of: debug, info, warning, error
    timeout:
      type: int
      default: 60000
      description: |
        Maximum timeout in milliseconds for browser navigation.
        Default is 60000 (60 seconds).
    extended-alert-rules:
      type: boolean
      default: false
      description: |
        Ship the extended Prometheus alert rule set on the metrics-endpoint
        relation in addition to the always-on baseline.

        See src/prometheus_alert_rules_extended/flaresolverr-extended.rules.yaml.
