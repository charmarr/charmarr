name: overseerr-k8s
type: charm
title: Overseerr
summary: "[DEPRECATED] Content request management for Plex - migrate to seerr-k8s"
description: |
  DEPRECATED: Upstream Overseerr has merged with Jellyseerr into the new
  Seerr project. This charm is in maintenance mode - no new features will
  be added. Migrate to seerr-k8s for ongoing support and feature parity.

  Migration path:
    juju run overseerr/0 export-config
    juju scp --container=overseerr overseerr/0:/config/overseerr-export.tgz .
    juju deploy seerr-k8s seerr
    juju scp --container=seerr ./overseerr-export.tgz seerr/0:/app/config/import.tgz
    juju run seerr/0 import-config path=/app/config/import.tgz

  Overseerr charm with automatic Radarr/Sonarr configuration via relations.

links:
  documentation: https://github.com/charmarr/charmarr
  source: https://github.com/charmarr/charmarr
  issues: https://github.com/charmarr/charmarr/issues

assumes:
  - k8s-api
  - juju >= 3.6

base: ubuntu@24.04
platforms:
  amd64:

parts:
  charm:
    source: .
    plugin: uv
    build-packages: [git]
    build-snaps: [astral-uv]

charm-libs:
  - lib: istio_beacon_k8s.service_mesh
    version: "0"
  - lib: istio_ingress_k8s.istio_ingress_route
    version: "0"
  # FIXME: velero_libs.velero_backup_config not yet on Charmhub.
  # Check with Kubeflow team when it's published, then fetch via charmcraft fetch-libs.
  # Currently vendored from https://github.com/canonical/velero-operator
  # - lib: velero_libs.velero_backup_config
  #   version: "0"

containers:
  overseerr:
    resource: overseerr-image
    mounts:
      - storage: config
        location: /config

resources:
  overseerr-image:
    type: oci-image
    description: OCI image for Overseerr (LinuxServer)
    upstream-source: lscr.io/linuxserver/overseerr:v1.35.0-ls159

storage:
  config:
    type: filesystem
    location: /config
    minimum-size: 1G
    description: Overseerr configuration and database.

provides:
  provide-cmr-mesh:
    interface: cross_model_mesh
    optional: true
    description: Access cross-model applications via service mesh
  velero-backup-config:
    interface: velero_backup_config
    limit: 1
    optional: true
    description: Configure Velero backups for config storage

requires:
  require-cmr-mesh:
    interface: cross_model_mesh
    optional: true
    description: Allow cross-model access via service mesh
  media-manager:
    interface: media-manager
    description: Connection to media managers (Radarr, Sonarr)
  media-server:
    interface: media-server
    description: Connection to media servers (Plex, Jellyfin) for service mesh
  service-mesh:
    interface: service_mesh
    limit: 1
    optional: true
    description: Subscribe this charm into a service mesh
  istio-ingress-route:
    interface: istio_ingress_route
    limit: 1
    optional: true
    description: Ingress routing via Istio gateway

config:
  options:
    log-level:
      type: string
      default: "info"
      description: |
        Application log level.
        One of: debug, info, warn, error
    ingress-port:
      type: int
      default: 80
      description: Port for the Istio ingress gateway listener.
    api-key-rotation:
      type: string
      default: "disabled"
      description: |
        Auto-rotate API key and sync to related apps.
        Options: disabled, daily, monthly, yearly

actions:
  rotate-api-key:
    description: |
      Rotate Overseerr API key.
      Note: This regenerates the key in Overseerr and updates the Juju secret.
      External integrations using the old key will need to be updated manually.
  export-config:
    description: |
      Export the Overseerr configuration (settings.json and database) as a
      tarball at /config/overseerr-export.tgz for migration to seerr-k8s.

      The tarball excludes logs, cache, and temporary files. Pull it from
      the workload container with:
        juju scp --container=overseerr <unit>:/config/overseerr-export.tgz .

      Then import into seerr-k8s with the import-config action. Returns the
      tarball path, size in bytes, sha256 checksum, and a copy hint.
